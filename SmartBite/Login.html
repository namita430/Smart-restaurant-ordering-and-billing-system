<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Restaurant Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h2>Smart Restaurant System</h2>
    <p>Customers can order directly. Admin login opens the management page.</p>

    <button type="button" class="guest-access-btn" onclick="continueAsCustomer()">Customer Free Access</button>
    <p class="access-note">Choose table and place orders without login.</p>

    <form onsubmit="return validateLogin()">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>

        <select id="role" required>
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">Admin Login</button>
    </form>

    <p id="error-msg"></p>
</div>

<script src="script.js"></script>
</body>
</html>
